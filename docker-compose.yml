version: '3.8'

services:
  # 🥷 Ninja Application
  ninja-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ninja-ci-cd
    ports:
      - "5000:5000"
    environment:
      - NINJA_CLAN=Shadow CI/CD
      - NINJA_MODE=stealth
      - PORT=5000
      - GUNICORN_WORKERS=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - ninja-network

  # 🧪 Development service (for local development)
  ninja-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ninja-ci-cd-dev
    ports:
      - "5001:5000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    profiles:
      - dev
    networks:
      - ninja-network

  # 🧪 Test runner
  ninja-tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ninja-ci-cd-tests
    volumes:
      - .:/app
    command: pytest tests/ -v --cov=src/ninja --cov-report=html
    profiles:
      - test
    networks:
      - ninja-network

networks:
  ninja-network:
    driver: bridge