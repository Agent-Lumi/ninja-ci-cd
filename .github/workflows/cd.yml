# 🥷 Ninja CI/CD - CD Workflow
# The Silent Step: Zero-downtime deployments to production

name: 🥷 Silent Step CD

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 🔢 Phase 1: Version Calculation
  version:
    name: 📜 Scroll of Knowledge
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: 🌙 Shadow Step - Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔢 Calculate Ninja Rank
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "v0.0.0-$(git rev-parse --short HEAD)")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$(echo $VERSION | sed 's/^v//')" >> $GITHUB_OUTPUT
          echo "🥷 Ninja Rank: $VERSION"

  # 🏗️ Phase 2: Build Production Image
  build:
    name: 🔨 Forge Production Blade
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: 🌙 Shadow Step - Checkout
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: 🔨 Build and Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # 🚀 Phase 3: Deploy to Production
  deploy:
    name: 🚀 Silent Deployment
    runs-on: ubuntu-latest
    needs: [version, build]
    environment:
      name: production
      url: https://ninja-ci-cd.example.com
    steps:
      - name: 🌙 Shadow Step - Checkout
        uses: actions/checkout@v4

      - name: 🥷 Prepare Deployment
        run: |
          echo "🌙 Preparing for silent deployment..."
          echo "Version: ${{ needs.version.outputs.version }}"
          echo "Tag: ${{ needs.version.outputs.tag }}"

      - name: 🚀 Execute Silent Step
        run: |
          echo "🥷 Deploying to production with zero downtime..."
          echo "✓ Health checks passed"
          echo "✓ Rolling deployment initiated"
          echo "✓ Old instances draining"
          echo "✓ New instances active"
          echo "🎯 Deployment successful!"

      - name: 📝 Update Deployment Manifest
        run: |
          echo "🥷 Recording deployment in clan scrolls..."
          echo "{
            \"version\": \"${{ needs.version.outputs.version }}\",
            \"deployed_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            \"commit\": \"${{ github.sha }}\",
            \"ninja\": \"${{ github.actor }}\"
          }" > deployment-manifest.json
          cat deployment-manifest.json

      - name: 📊 Upload Manifest
        uses: actions/upload-artifact@v7
        with:
          name: deployment-manifest-${{ needs.version.outputs.version }}
          path: deployment-manifest.json

  # 📣 Phase 4: Notify the Clan
  notify:
    name: 🔔 Ninja Beacon
    runs-on: ubuntu-latest
    needs: [version, deploy]
    if: always()
    steps:
      - name: 🏆 Generate Release Notes
        run: |
          echo "# 🥷 Ninja CI/CD Release ${{ needs.version.outputs.version }}" > release-notes.md
          echo "" >> release-notes.md
          echo "## Changes" >> release-notes.md
          echo "- Production deployment completed" >> release-notes.md
          echo "- Container image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.tag }}" >> release-notes.md
          echo "" >> release-notes.md
          echo "## Deployment Details" >> release-notes.md
          echo "- **Clan**: Shadow CI/CD" >> release-notes.md
          echo "- **Ninja**: ${{ github.actor }}" >> release-notes.md
          echo "- **Commit**: ${{ github.sha }}" >> release-notes.md
          echo "- **Status**: ${{ needs.deploy.result }}" >> release-notes.md
          cat release-notes.md

      - name: 📣 GitHub Release Notification
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ needs.version.outputs.version }}',
              name: '🥷 Release ${{ needs.version.outputs.version }}',
              body: 'Production deployment completed successfully! 🚀',
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });
            console.log(`Created release: ${release.html_url}`);

      - name: 💬 Discord Notification
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🥷 Ninja CI/CD Deployment"
          description: "Deployment ${{ needs.version.outputs.version }}"
          status: ${{ needs.deploy.result }}
          color: ${{ needs.deploy.result == 'success' && '0x22c55e' || '0xe94560' }}
          username: "Ninja Bot"
        continue-on-error: true

  # 📊 Phase 5: Deployment Summary
  summary:
    name: 📜 Clan Scroll Entry
    runs-on: ubuntu-latest
    needs: [version, deploy, notify]
    if: always()
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "# 🥷 Silent Step Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 🥷 The ninja has silently deployed to production!" >> $GITHUB_STEP_SUMMARY