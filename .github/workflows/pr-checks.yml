# 🥷 Ninja CI/CD - Fast PR Checks
# The Quick Draw: Rapid feedback for pull requests

name: 🥷 Quick Draw

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements*.txt'

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ⚡ Phase 1: Lightning Fast Tests
  quick-tests:
    name: ⚡ Lightning Strike
    runs-on: ubuntu-latest
    steps:
      - name: 🌙 Shadow Step - Checkout
        uses: actions/checkout@v4

      - name: 🐍 Summon Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Quick Setup
        run: |
          pip install pytest pytest-cov -q
          pip install -e . -q

      - name: ⚡ Fast Test Execution
        run: |
          echo "🥷 Executing lightning-fast tests..."
          pytest tests/ -v --tb=short --cov=src/ninja --cov-report=term-missing -x
        env:
          PYTHONPATH: src

  # 🔍 Phase 2: Rapid Code Quality Check
  quick-lint:
    name: 🔍 Shadow Glance
    runs-on: ubuntu-latest
    steps:
      - name: 🌙 Shadow Step - Checkout
        uses: actions/checkout@v4

      - name: 🐍 Summon Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🔍 Quick Quality Check
        run: |
          pip install black flake8 -q
          echo "🥷 Quick format check..."
          black --check --diff src/ tests/ || true
          echo "🥷 Quick lint check..."
          flake8 src/ tests/ --max-line-length=88 --extend-ignore=E203,W503 || true

  # 🏷️ Phase 3: PR Auto-Labeling
  label:
    name: 🏷️ Clan Marking
    runs-on: ubuntu-latest
    steps:
      - name: 🌙 Shadow Step - Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Analyze Changes
        id: labeler
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: 📝 Size Label
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: '🥷 size/xs'
          xs_max_size: 10
          s_label: 'size/s'
          s_max_size: 100
          m_label: 'size/m'
          m_max_size: 500
          l_label: 'size/l'
          l_max_size: 1000
          xl_label: 'size/xl'
          fail_if_xl: false
          message_if_xl: 🥷 This PR is too large for a ninja! Consider breaking it down.

  # 📝 Phase 4: PR Description Check
  pr-check:
    name: 📝 Mission Briefing
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Check PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Check if PR has a description
            if (!pr.body || pr.body.trim().length < 50) {
              core.setFailed('🥷 Your mission briefing is too brief! Please provide more details.');
            }
            
            // Check for common sections
            const body = pr.body.toLowerCase();
            const hasWhat = body.includes('what') || body.includes('changes');
            const hasWhy = body.includes('why') || body.includes('reason');
            
            if (!hasWhat || !hasWhy) {
              console.log('💡 Tip: Consider adding WHAT and WHY sections to your PR description');
            }

  # 🎯 Phase 5: Quick Summary
  summary:
    name: 📜 Quick Report
    runs-on: ubuntu-latest
    needs: [quick-tests, quick-lint, label, pr-check]
    if: always()
    steps:
      - name: 📊 Generate Report
        run: |
          echo "# 🥷 Quick Draw Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lightning Strike | ${{ needs.quick-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shadow Glance | ${{ needs.quick-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Clan Marking | ${{ needs.label.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mission Briefing | ${{ needs.pr-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.quick-tests.result }}" == "success" && "${{ needs.quick-lint.result }}" == "success" ]]; then
            echo "✅ 🥷 Fast checks passed! Ready for full review." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 🥷 Some checks failed. Address issues before merging." >> $GITHUB_STEP_SUMMARY
          fi