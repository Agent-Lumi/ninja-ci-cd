# 🥷 Ninja CI/CD - Nightly Security Scans
# The Night Watch: Continuous security monitoring

name: 🥷 Night Watch

on:
  schedule:
    # Run at midnight UTC every day (ninja hour 🌙)
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  # 🔍 Phase 1: Code Vulnerability Scan
  codeql:
    name: 🔮 Crystal Ball Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: 🌙 Shadow Step - Checkout
        uses: actions/checkout@v4

      - name: 🔮 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Dependencies
        run: |
          pip install -e ".[dev]"

      - name: 🔮 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # 🦠 Phase 2: Dependency Audit
  dependency-check:
    name: 🔍 Clan Supply Check
    runs-on: ubuntu-latest
    steps:
      - name: 🌙 Shadow Step - Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Tools
        run: |
          pip install safety pip-audit

      - name: 🔍 Safety Scan
        run: |
          echo "🥷 Scanning for vulnerable dependencies..."
          safety check --full-report || true

      - name: 📜 Dependency Audit
        run: |
          echo "🥷 Auditing installed packages..."
          pip-audit --desc --format=markdown > dependency-audit-report.md || true
          cat dependency-audit-report.md

      - name: 📊 Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit-report
          path: dependency-audit-report.md

  # 🐳 Phase 3: Container Scanning
  container-scan:
    name: 🐳 Container Seal
    runs-on: ubuntu-latest
    steps:
      - name: 🌙 Shadow Step - Checkout
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Container
        run: |
          docker build -t ninja-ci-cd:nightly .

      - name: 🔍 Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ninja-ci-cd:nightly
          format: 'sarif'
          output: 'trivy-nightly.sarif'
          severity: 'CRITICAL,HIGH'

      - name: 📊 Upload Trivy Report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-nightly.sarif
          category: container-scan

      - name: 📄 Generate Markdown Report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ninja-ci-cd:nightly
          format: 'template'
          template: '@/contrib/sarif.tpl'
          output: 'trivy-nightly.md'

  # 📝 Phase 4: Security Report
  report:
    name: 📜 Night Watch Report
    runs-on: ubuntu-latest
    needs: [codeql, dependency-check, container-scan]
    if: always()
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "# 🥷 Night Watch Security Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date**: $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scan | ${{ needs.container-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 🥷 The night watch has completed. All threats assessed." >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Security Alert: Night Watch Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## 🥷 Night Watch Security Scan Failed
            
            The nightly security scan has detected issues that require attention.
            
            ### Failed Checks:
            - CodeQL: ${{ needs.codeql.result }}
            - Dependency Check: ${{ needs.dependency-check.result }}
            - Container Scan: ${{ needs.container-scan.result }}
            
            ### Action Required:
            1. Review the detailed scan logs
            2. Address any critical vulnerabilities
            3. Re-run the scan to verify fixes
            
            [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'nightly-scan', 'ninja-alert']
            });